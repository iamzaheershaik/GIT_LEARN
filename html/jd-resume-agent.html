<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JD → Resume Tailor — ATS Optimization Agent</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../styles/jd-resume-agent.css">
</head>
<body>

<!-- Header -->
<div class="header">
  <div class="header-icon">⚡</div>
  <div>
    <div class="header-title">JD → RESUME TAILOR</div>
    <div class="header-sub">ATS OPTIMIZATION AGENT · POWERED BY CLAUDE</div>
  </div>
  <div class="header-dots">
    <div class="header-dot" style="background:#ff5f57"></div>
    <div class="header-dot" style="background:#febc2e"></div>
    <div class="header-dot" style="background:#28c840"></div>
  </div>
</div>

<!-- API Key Bar -->
<div class="api-bar">
  <div class="api-bar-inner">
    <span class="api-label">🔑 API KEY</span>
    <input type="password" id="apiKeyInput" class="api-input" placeholder="sk-ant-... (your Anthropic API key)" />
    <span class="api-hint">Key stays in your browser only — never sent to any server except Anthropic</span>
  </div>
</div>

<!-- Main -->
<div class="main">
  <!-- LEFT -->
  <div class="left">
    <div class="input-area bordered">
      <div class="section-header" style="color:#00ff9d">
        <span class="num">01</span> JOB DESCRIPTION
        <span class="chars" id="jdChars">0 chars</span>
      </div>
      <textarea id="jdInput" placeholder="Paste the full job description here..."></textarea>
    </div>
    <div class="input-area">
      <div class="section-header" style="color:#0099ff">
        <span class="num">02</span> BASE RESUME (JSON)
        <span class="json-err" id="jsonErr" style="display:none"></span>
      </div>
      <textarea id="resumeInput" class="small" placeholder='{ "name": "...", "experience": [...] }'></textarea>
    </div>
    <div class="run-bar">
      <div class="error-msg" id="errorMsg" style="display:none"></div>
      <button class="run-btn" id="runBtn" onclick="runAgent()">⚡ TAILOR MY RESUME</button>
    </div>
  </div>

  <!-- RIGHT -->
  <div class="right" id="rightPanel">
    <div class="empty" id="emptyState">
      <div class="icon">◎</div>
      <div class="label">AWAITING INPUT</div>
      <div class="hint">Paste a JD + your resume JSON on the left, then hit TAILOR MY RESUME</div>
    </div>
  </div>
</div>

<script src="../src/jd-resume-agent.js"></script>
</body>
</html>
